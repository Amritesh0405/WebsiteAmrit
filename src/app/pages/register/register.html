<div class="register-page">
    <div class="register-card">
      <div class="card-header">
        <h2>🔥 CylinderBook</h2>
        <p>Create your organisation account</p>
      </div>
  
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Organisation Name</label>
          <input type="text" [(ngModel)]="form.orgName" name="orgName" placeholder="e.g. ABC Hotels Pvt Ltd" required />
        </div>
  
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="form.name" name="name" placeholder="Your full name" required />
        </div>
  
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" [(ngModel)]="form.email" name="email" placeholder="you@company.com" required />
        </div>
  
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" [(ngModel)]="form.phone" name="phone" placeholder="+91 98765 43210" required />
        </div>
  
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="form.password" name="password" placeholder="Min 8 characters" required />
        </div>
  
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="form.confirmPassword" name="confirmPassword" placeholder="Repeat password" required />
        </div>
  
        <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>
  
        <button type="submit" class="btn-submit">Create Account</button>
      </form>
  
      <p class="login-link">Already have an account? <a routerLink="/login">Login here</a></p>
    </div>
  </div>
