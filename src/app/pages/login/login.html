<div class="login-page">
    <div class="login-card">
      <div class="card-header">
        <h2>🔥 CylinderBook</h2>
        <p>Login to your organisation account</p>
      </div>
  
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" [(ngModel)]="form.email" name="email" placeholder="you@company.com" required />
        </div>
  
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="form.password" name="password" placeholder="Your password" required />
        </div>
  
        <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>
  
        <button type="submit" class="btn-submit">Login</button>
      </form>
  
      <p class="register-link">Don't have an account? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
